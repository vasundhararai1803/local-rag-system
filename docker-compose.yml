version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vector_service
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  rag-app:
    build: .
    container_name: rag_application
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - VECTOR_STORE_URL=http://qdrant:6333
    depends_on:
      - ollama
      - qdrant

volumes:
  ollama_storage:
  qdrant_storage:
